<!DOCTYPE html>
<html>
<head>
    <title>Prime Number Calculator</title>
    <style>
        .container {
            margin: 20px;
            padding: 20px;
            width: 300px;
            border: 1px solid rgb(0, 255, 0);
            border-radius: 10px;
        }
        .form-group {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Prime Number Calculator</h2>
        <form action="prime" method="post">
            <div class="form-group">
                Enter a number:
                <input type="number" name="number" min="0" max="20" required>
                <small>(Max: 20)</small>
            </div>
            <input type="submit" value="PrimeNumber">
        </form>
    </div>
</body>
</html>
